name: marketview
description: MarketView by Clearview Dev
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

  # Mapa gratuito (OpenStreetMap, sem API key)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^12.0.0

  # HTTP para ViaCEP
  http: ^1.2.0

  # Máscaras (CPF, CEP, telefone)
  mask_text_input_formatter: ^2.9.0

  # Animações
  flutter_animate: ^4.5.0

  # Fontes e UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1

  # Upload de imagens
  image_picker: ^1.1.2
  image_cropper: ^7.0.0
  photo_manager: ^3.7.1
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.2

  # Provider para gerenciamento de estado
  provider: ^6.1.2

  # Ícones
  cupertino_icons: ^1.0.6
  firebase_app_check: ^0.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
